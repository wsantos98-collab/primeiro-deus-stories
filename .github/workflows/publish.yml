name: Publicar story Primeiro Deus

on:
  schedule:
    # Repo público (cota ilimitada): despertares escalonados; o primeiro que acordar
    # segura até as 05:30 BRT em ponto e publica; os demais dão skip idempotente.
    # Atrasos de até ~3h do scheduler do GitHub ficam cobertos.
    - cron: "30 5 * * *"   # 05:30 UTC = 02:30 BRT
    - cron: "30 6 * * *"   # 06:30 UTC = 03:30 BRT
    - cron: "30 7 * * *"   # 07:30 UTC = 04:30 BRT
    - cron: "0 9 * * *"    # 09:00 UTC = 06:00 BRT; rede de segurança final
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = só valida a ingestão, não publica"
        required: false
        default: "false"

permissions:
  contents: write

concurrency: publicar-story

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 200
    steps:
      - uses: actions/checkout@v4

      - name: Publicar story do dia
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          WAIT_FOR_TARGET: ${{ github.event_name == 'schedule' }}
        run: python3 publish_story.py

      - name: Registrar publicação
        run: |
          git config user.name "primeiro-deus-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fila/published.json
          git diff --cached --quiet || git commit -m "registro: story publicado"
          git pull --rebase
          git push
